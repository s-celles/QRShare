<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a1a2e"/>
  <g transform="translate(64,64)" fill="#6c8cff">
    <!-- QR-like pattern top-left -->
    <rect x="0" y="0" width="96" height="96" rx="8"/>
    <rect x="16" y="16" width="64" height="64" rx="4" fill="#1a1a2e"/>
    <rect x="32" y="32" width="32" height="32" rx="2" fill="#6c8cff"/>
    <!-- QR-like pattern top-right -->
    <rect x="288" y="0" width="96" height="96" rx="8"/>
    <rect x="304" y="16" width="64" height="64" rx="4" fill="#1a1a2e"/>
    <rect x="320" y="32" width="32" height="32" rx="2" fill="#6c8cff"/>
    <!-- QR-like pattern bottom-left -->
    <rect x="0" y="288" width="96" height="96" rx="8"/>
    <rect x="16" y="304" width="64" height="64" rx="4" fill="#1a1a2e"/>
